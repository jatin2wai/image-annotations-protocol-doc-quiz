<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Image Annotations Protocol — Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeede9;
    --text-primary: #1a1a19;
    --text-secondary: #6b6b68;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --radius-md: 8px;
    --radius-lg: 12px;
    --green-fill: #E1F5EE;
    --green-border: #5DCAA5;
    --green-text: #085041;
    --green-btn: #1D9E75;
    --green-btn-hover: #0F6E56;
    --red-fill: #FCEBEB;
    --red-border: #F09595;
    --red-text: #501313;
    --amber-fill: #FAEEDA;
    --amber-text: #633806;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #262624;
      --bg-tertiary: #2e2e2b;
      --text-primary: #f0efe8;
      --text-secondary: #9a9994;
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.22);
      --green-fill: #04342C;
      --green-border: #0F6E56;
      --green-text: #9FE1CB;
      --green-btn: #1D9E75;
      --green-btn-hover: #5DCAA5;
      --red-fill: #501313;
      --red-border: #A32D2D;
      --red-text: #F7C1C1;
      --amber-fill: #412402;
      --amber-text: #FAC775;
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .wrap { max-width: 700px; margin: 0 auto; }

  .site-header { text-align: center; margin-bottom: 2.5rem; }
  .site-header .badge {
    display: inline-block;
    font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
    background: var(--green-fill); color: var(--green-text);
    border: 1px solid var(--green-border); border-radius: 999px;
    padding: 4px 14px; margin-bottom: 12px;
  }
  .site-header h1 { font-size: 26px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; line-height: 1.3; }
  .site-header p  { font-size: 15px; color: var(--text-secondary); }

  .progress-wrap { background: var(--bg-secondary); border-radius: 999px; height: 6px; margin: 1.5rem 0 0.4rem; overflow: hidden; }
  .progress-bar  { height: 6px; border-radius: 999px; background: var(--green-btn); transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: var(--text-secondary); text-align: right; margin-bottom: 1.5rem; }

  .question-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.75rem; margin-bottom: 1rem; }
  .q-meta { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 12px; }
  .q-text { font-size: 17px; color: var(--text-primary); line-height: 1.55; margin-bottom: 1.5rem; font-weight: 400; }

  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px; border-radius: var(--radius-md);
    border: 1px solid var(--border); cursor: pointer;
    background: var(--bg); transition: background 0.15s, border-color 0.15s;
    text-align: left; width: 100%; font-family: var(--font);
  }
  .opt:hover:not(:disabled) { background: var(--bg-secondary); border-color: var(--border-hover); }
  .opt:disabled { cursor: default; }
  .opt.selected { border-color: var(--green-btn); background: var(--green-fill); }
  .opt.correct  { border-color: var(--green-border); background: var(--green-fill); }
  .opt.wrong    { border-color: var(--red-border); background: var(--red-fill); }
  .opt.dimmed   { opacity: 0.4; }
  .opt-letter { font-size: 12px; font-weight: 600; color: var(--text-secondary); min-width: 20px; margin-top: 1px; }
  .opt.selected .opt-letter, .opt.correct .opt-letter { color: var(--green-text); }
  .opt.wrong .opt-letter { color: var(--red-text); }
  .opt-text { font-size: 14px; color: var(--text-primary); line-height: 1.55; }
  .opt.correct .opt-text { color: var(--green-text); }
  .opt.wrong   .opt-text { color: var(--red-text); }

  .feedback { margin-top: 1rem; padding: 12px 16px; border-radius: var(--radius-md); font-size: 13px; line-height: 1.6; display: none; }
  .feedback.show    { display: block; }
  .feedback.correct { background: var(--green-fill); color: var(--green-text); border: 1px solid var(--green-border); }
  .feedback.wrong   { background: var(--red-fill);   color: var(--red-text);   border: 1px solid var(--red-border); }

  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem; gap: 12px; }
  .btn { padding: 10px 24px; font-size: 14px; font-weight: 500; border-radius: var(--radius-md); border: 1px solid var(--border-hover); background: var(--bg); color: var(--text-primary); cursor: pointer; font-family: var(--font); transition: background 0.15s; }
  .btn:hover:not(:disabled) { background: var(--bg-secondary); }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn.primary { background: var(--green-btn); color: #fff; border-color: var(--green-btn-hover); }
  .btn.primary:hover:not(:disabled) { background: var(--green-btn-hover); }

  .score-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2.5rem 2rem; text-align: center; margin-bottom: 2.5rem; }
  .score-circle { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 30px; font-weight: 600; }
  .score-title { font-size: 22px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
  .score-sub   { font-size: 15px; color: var(--text-secondary); margin-bottom: 2rem; }

  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 2rem; }
  .summary-cell { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1rem; }
  .summary-num  { font-size: 26px; font-weight: 600; color: var(--text-primary); }
  .summary-lbl  { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }

  .section-divider { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; color: var(--text-secondary); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 1.25rem; }

  .review-item { border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .review-item.correct { background: var(--green-fill); border: 1px solid var(--green-border); }
  .review-item.wrong   { background: var(--red-fill);   border: 1px solid var(--red-border); }
  .review-meta { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 8px; }
  .review-item.correct .review-meta { color: var(--green-text); }
  .review-item.wrong   .review-meta { color: var(--red-text); }
  .review-q { font-size: 14px; color: var(--text-primary); margin-bottom: 10px; line-height: 1.5; }
  .review-wrong-ans   { font-size: 13px; margin-bottom: 4px; }
  .review-item.wrong .review-wrong-ans { color: var(--red-text); }
  .review-correct-ans { font-size: 13px; margin-bottom: 10px; }
  .review-item.correct .review-correct-ans { color: var(--green-text); }
  .review-item.wrong   .review-correct-ans { color: var(--red-text); }
  .review-explain { font-size: 13px; line-height: 1.6; padding-top: 10px; }
  .review-item.correct .review-explain { color: var(--green-text); border-top: 1px solid var(--green-border); }
  .review-item.wrong   .review-explain { color: var(--red-text);   border-top: 1px solid var(--red-border); }

  .loading { text-align: center; padding: 4rem 1rem; color: var(--text-secondary); font-size: 15px; }

  .footer { text-align: center; margin-top: 3rem; font-size: 12px; color: var(--text-secondary); }

  @media (max-width: 520px) {
    .site-header h1 { font-size: 20px; }
    .q-text { font-size: 15px; }
    .question-card { padding: 1.25rem; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header class="site-header">
    <div class="badge">Knowledge check</div>
    <h1>Image Annotations Protocol</h1>
    <p>Quiz for crop image dataset annotators — PDSA &amp; Garuda models</p>
  </header>

  <!-- Loading state -->
  <div id="loading" class="loading">Loading questions…</div>

  <!-- Quiz view -->
  <div id="quiz-view" style="display:none">
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label">Question 1 of 20</div>
    <div id="question-container"></div>
    <div class="nav">
      <button class="btn" id="prev-btn" onclick="goTo(current-1)" disabled>← Previous</button>
      <button class="btn primary" id="next-btn" disabled>Next →</button>
    </div>
  </div>

  <!-- Score view -->
  <div id="score-view" style="display:none">
    <div class="score-card">
      <div class="score-circle" id="score-circle"></div>
      <div class="score-title" id="score-title"></div>
      <div class="score-sub"   id="score-sub"></div>
      <div class="summary-grid">
        <div class="summary-cell"><div class="summary-num" id="s-correct"></div><div class="summary-lbl">Correct</div></div>
        <div class="summary-cell"><div class="summary-num" id="s-wrong"></div><div class="summary-lbl">Wrong</div></div>
        <div class="summary-cell"><div class="summary-num" id="s-total"></div><div class="summary-lbl">Total</div></div>
      </div>
      <button class="btn primary" onclick="restart()" style="padding:12px 36px;font-size:15px;">Retake quiz</button>
    </div>
    <div class="section-divider">Review all answers</div>
    <div id="review-container"></div>
  </div>

  <div class="footer">Image Annotations Protocol Quiz &nbsp;·&nbsp; PDSA &amp; Garuda crop image datasets</div>
</div>

<script>
let questions = [];

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDeck() {
  return shuffleArray(questions).map(q => {
    const correctText = q.opts[q.ans];
    const shuffledOpts = shuffleArray(q.opts);
    return {
      section: q.section,
      q: q.q,
      opts: shuffledOpts,
      ans: shuffledOpts.indexOf(correctText),
      explain: q.explain
    };
  });
}

let deck    = [];
let current = 0;
let answers = [];
let locked  = [];

fetch('questions.json')
  .then(res => res.json())
  .then(data => {
    questions = data;
    deck      = buildDeck();
    answers   = Array(deck.length).fill(null);
    locked    = Array(deck.length).fill(false);
    document.getElementById('loading').style.display   = 'none';
    document.getElementById('quiz-view').style.display = 'block';
    render();
  })
  .catch(() => {
    document.getElementById('loading').innerHTML =
      '<p style="color:var(--red-text)">Failed to load questions.json — make sure it is in the same folder as index.html.</p>';
  });

function render() {
  const q        = deck[current];
  const letters  = ['A','B','C','D','E'];
  const isLocked = locked[current];
  const chosen   = answers[current];

  let html = `<div class="question-card">
    <div class="q-meta">Section: ${q.section} &nbsp;·&nbsp; Question ${current+1} of ${deck.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">`;

  q.opts.forEach((opt, i) => {
    let cls = 'opt';
    if (isLocked) {
      if (i === q.ans)       cls += ' correct';
      else if (i === chosen) cls += ' wrong';
      else                   cls += ' dimmed';
    } else if (chosen === i) {
      cls += ' selected';
    }
    const disabled = isLocked ? 'disabled' : '';
    html += `<button class="${cls}" ${disabled} onclick="choose(${i})">
      <span class="opt-letter">${letters[i]}</span>
      <span class="opt-text">${opt}</span>
    </button>`;
  });

  html += '</div>';

  if (isLocked) {
    const isCorrect = chosen === q.ans;
    html += `<div class="feedback ${isCorrect ? 'correct' : 'wrong'} show">
      <strong>${isCorrect ? 'Correct.' : `Incorrect. The right answer is ${letters[q.ans]}: ${q.opts[q.ans]}.`}</strong>
      ${q.explain}
    </div>`;
  }

  html += '</div>';
  document.getElementById('question-container').innerHTML = html;

  const pct = Math.round((current + 1) / deck.length * 100);
  document.getElementById('progress-bar').style.width    = pct + '%';
  document.getElementById('progress-label').textContent  = `Question ${current+1} of ${deck.length}`;
  document.getElementById('prev-btn').disabled = current === 0;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.disabled = !isLocked;
  if (current === deck.length - 1) {
    nextBtn.textContent = 'Finish quiz';
    nextBtn.onclick = finish;
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.onclick = () => goTo(current + 1);
  }
}

function choose(i) {
  if (locked[current]) return;
  answers[current] = i;
  locked[current]  = true;
  render();
}

function goTo(n) {
  if (n < 0 || n >= deck.length) return;
  current = n;
  render();
}

function finish() {
  const correct = answers.reduce((sum, a, i) => sum + (a === deck[i].ans ? 1 : 0), 0);
  const total   = deck.length;
  const pct     = Math.round(correct / total * 100);

  document.getElementById('quiz-view').style.display  = 'none';
  document.getElementById('score-view').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  const circle = document.getElementById('score-circle');
  if (pct >= 80) { circle.style.background = 'var(--green-fill)'; circle.style.color = 'var(--green-text)'; }
  else if (pct >= 60) { circle.style.background = 'var(--amber-fill)'; circle.style.color = 'var(--amber-text)'; }
  else { circle.style.background = 'var(--red-fill)'; circle.style.color = 'var(--red-text)'; }
  circle.textContent = pct + '%';

  document.getElementById('score-title').textContent = pct >= 80 ? 'Great work!' : pct >= 60 ? 'Good effort' : 'Keep practising';
  document.getElementById('score-sub').textContent   = `You answered ${correct} out of ${total} questions correctly.`;
  document.getElementById('s-correct').textContent   = correct;
  document.getElementById('s-wrong').textContent     = total - correct;
  document.getElementById('s-total').textContent     = total;

  const letters = ['A','B','C','D','E'];
  let reviewHtml = '';
  deck.forEach((q, i) => {
    const isCorrect = answers[i] === q.ans;
    const cls = isCorrect ? 'correct' : 'wrong';
    reviewHtml += `<div class="review-item ${cls}">
      <div class="review-meta">${q.section} · Q${i+1} · ${isCorrect ? '✓ Correct' : '✗ Incorrect'}</div>
      <div class="review-q">${q.q}</div>
      ${!isCorrect ? `<div class="review-wrong-ans">Your answer: ${answers[i] !== null ? letters[answers[i]] + ': ' + q.opts[answers[i]] : 'Not answered'}</div>` : ''}
      <div class="review-correct-ans">Correct answer: ${letters[q.ans]}: ${q.opts[q.ans]}</div>
      <div class="review-explain">${q.explain}</div>
    </div>`;
  });
  document.getElementById('review-container').innerHTML = reviewHtml;
}

function restart() {
  deck    = buildDeck();
  answers = Array(deck.length).fill(null);
  locked  = Array(deck.length).fill(false);
  current = 0;
  document.getElementById('score-view').style.display = 'none';
  document.getElementById('quiz-view').style.display  = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}
</script>
</body>
</html>
